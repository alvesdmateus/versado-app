<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Study smarter with spaced repetition" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Versado" />
    <script>
      (function() {
        var t = localStorage.getItem("theme");
        if (t === "dark" || (!t && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
          document.documentElement.classList.add("dark");
          document.querySelector('meta[name="theme-color"]').setAttribute("content", "#0f172a");
        }
      })();
    </script>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>Versado</title>
    <script async src="https://js.stripe.com/v3/pricing-table.js"></script>
  </head>
  <body>
    <div id="root">
      <!-- Inline splash screen — visible while JS loads, replaced by React -->
      <div id="splash" style="display:flex;align-items:center;justify-content:center;min-height:100dvh;background:#f9fafb;">
        <style>
          .dark #splash { background: #0f172a !important; }
          @keyframes splash-pulse { 0%,100% { opacity:1; } 50% { opacity:.6; } }
          #splash svg { animation: splash-pulse 2s ease-in-out infinite; }
        </style>
        <svg width="80" height="80" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
          <defs><linearGradient id="sg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#4a8af4"/><stop offset="100%" stop-color="#6da4f7"/></linearGradient></defs>
          <rect width="512" height="512" rx="96" fill="url(#sg)"/>
          <text x="256" y="350" font-family="system-ui,sans-serif" font-size="340" font-weight="700" fill="white" text-anchor="middle">V</text>
        </svg>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
