name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GH_PAT }}

  android-build:
    name: Build Android APK & AAB
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: versado-android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > versado.keystore

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build release AAB and APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: ./gradlew bundleRelease assembleRelease

      - name: Upload artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          AAB="app/build/outputs/bundle/release/app-release.aab"
          APK="app/build/outputs/apk/release/app-release.apk"

          if [ -f "$AAB" ]; then
            gh release upload "$TAG" "$AAB" --clobber --repo "$GITHUB_REPOSITORY"
          fi
          if [ -f "$APK" ]; then
            gh release upload "$TAG" "$APK" --clobber --repo "$GITHUB_REPOSITORY"
          fi
